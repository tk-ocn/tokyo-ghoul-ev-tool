<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>東京喰種 喰ポイント考慮 期待値ツール</title>
<style>
  * { box-sizing: border-box; -webkit-text-size-adjust: 100%; }
  body { font-family: -apple-system, "Yu Gothic UI", "Yu Gothic", sans-serif;
         background: #f5f5f5; margin: 0; padding: 12px; color: #222; }
  h1 { font-size: 17px; margin: 0 0 8px; line-height: 1.3; }
  .meta { color: #666; font-size: 11px; margin-bottom: 12px; line-height: 1.5; }
  .panel { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
           padding: 12px 14px; margin-bottom: 12px; }
  .ctrl { display: flex; gap: 18px; flex-wrap: wrap; align-items: flex-start; }
  .ctrl-group { margin-bottom: 4px; }
  .ctrl-group.hide { display: none; }
  .ctrl-group label.h { display: block; font-size: 12px; font-weight: bold; margin-bottom: 6px; color: #34495E; }
  .radio-row label { display: inline-block; font-weight: normal; margin: 0 8px 6px 0; font-size: 14px;
                     cursor: pointer; padding: 6px 12px; background: #ECF0F1; border-radius: 16px; }
  .radio-row input { margin-right: 4px; transform: scale(1.1); vertical-align: middle; }
  .radio-row input:checked + span { font-weight: bold; }
  select { padding: 7px 8px; font-size: 14px; border: 1px solid #bbb; border-radius: 4px; }
  .tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #ddd; border-radius: 6px; max-width: 560px; }
  table.main { border-collapse: collapse; background: #fff; width: 100%; }
  table.main th { background: #D6DBDF; padding: 8px 10px; font-size: 12px; border: 1px solid #999;
                  text-align: center; position: sticky; top: 0; z-index: 2; white-space: nowrap; }
  table.main th.medal { background: #D1F2EB; }
  table.main td { padding: 7px 10px; font-size: 13px; border: 1px solid #d0d0d0; text-align: right; white-space: nowrap; }
  table.main td.sc, table.main th.sc { position: sticky; left: 0; z-index: 1;
                  background: #EBEDEF; text-align: center; font-weight: bold; font-size: 13px; }
  table.main th.sc { z-index: 3; }
  table.main td.na { color: #bbb; text-align: center; }
  td.roi { font-weight: bold; }
  td.roi.pos { background: #EBF5FB; color: #1F5FBF; }
  td.roi.neg { background: #FDEDEC; color: #C0392B; }
  .note { font-size: 11px; color: #999; margin-top: 12px; line-height: 1.6; }
  @media (max-width: 600px){
    body { background: #16181c; color: #e2e4e8; padding: 4px; }
    h1 { font-size: 14px; color: #f0f2f5; }
    .meta, .note { color: #8b9099; font-size: 10px; }
    .panel { background: #23262d; box-shadow: 0 1px 4px rgba(0,0,0,0.4); padding: 6px 8px; }
    .ctrl { gap: 6px 10px; }
    .ctrl-group { margin-bottom: 0; }
    .ctrl-group label.h { color: #aeb4be; font-size: 11px; margin-bottom: 3px; }
    .radio-row label { background: #31353d; color: #d5d8dd; font-size: 12px; padding: 4px 8px; margin: 0 3px 3px 0; }
    .radio-row input:checked + span { color: #6db3ff; }
    select { background: #2b2f37; color: #e2e4e8; border-color: #444; padding: 4px 6px; font-size: 13px; }
    .tbl-scroll { border-color: #3a3d44; max-width: 100%; }
    table.main { background: #23262d; min-width: 0; width: 100%; table-layout: fixed; }
    table.main th, table.main td { width: 54px; }
    table.main th.sc, table.main td.sc { width: 54px; }
    table.main th { background: #2f333b; color: #d5d8dd; border-color: #43474f; padding: 4px 3px; font-size: 11px; }
    table.main th.medal { background: #234038; color: #b8e6d6; }
    table.main td { border-color: #3a3d44; padding: 4px 3px; font-size: 11px; overflow: hidden; text-overflow: ellipsis; }
    table.main td.sc, table.main th.sc { background: #2d3344; color: #e8eaf0; font-size: 12px; padding: 4px 3px; }
    table.main td.na { color: #666; }
    td.roi.pos { background: #16263a; color: #6db3ff; }
    td.roi.neg { background: #341a1c; color: #ff8b8b; }
  }
</style>
</head>
<body>

<h1>東京喰種 喰ポイント考慮 期待値ツール</h1>
<div class="meta">
  事前計算値（その場で回さず即表示）・N=<span id="metaN">?</span> ・ params.py 由来（debug1のf(K)・中漏れ率, 既出TY）・ 期待値=1枚20円
</div>

<div class="panel">
  <div class="ctrl">
    <div class="ctrl-group">
      <label class="h">戦略</label>
      <div class="radio-row" id="strat">
        <label><input type="radio" name="strat" value="RUSH狙い" checked><span>RUSH狙い</span></label>
        <label><input type="radio" name="strat" value="解放狙い"><span>RUSH1回狙い(中以上確認で解放まで)</span></label>
        <label><input type="radio" name="strat" value="CZ一回狙い"><span>CZ1回狙い(中以上確認で解放まで)</span></label>
      </div>
    </div>
    <div class="ctrl-group" id="kptGroup">
      <label class="h">喰ポイント</label>
      <select id="kpt"></select>
    </div>
    <div class="ctrl-group">
      <label class="h">スルー回数</label>
      <select id="suru"></select>
    </div>
    <div class="ctrl-group">
      <label class="h">前回RUSH</label>
      <div class="radio-row" id="kake">
        <label><input type="radio" name="kake" value="1" checked><span>駆け抜け</span></label>
        <label><input type="radio" name="kake" value="0"><span>非駆け抜け</span></label>
      </div>
    </div>
    <div class="ctrl-group">
      <label class="h">液晶G</label>
      <select id="lcd"></select>
    </div>
    <div class="ctrl-group">
      <label class="h">既吸収なし台</label>
      <div class="radio-row" id="abs">
        <label><input type="radio" name="abs" value="0" checked><span>あり</span></label>
        <label><input type="radio" name="abs" value="1"><span>なし</span></label>
      </div>
    </div>
    <div class="ctrl-group">
      <label class="h">交換率</label>
      <div class="radio-row" id="kpat">
        <label><input type="radio" name="kpat" value="eq" checked><span>等価(20円)</span></label>
        <label><input type="radio" name="kpat" value="k56"><span>50貸し/56交換</span></label>
        <label><input type="radio" name="kpat" value="k52"><span>46貸し/52交換</span></label>
      </div>
    </div>
    <div class="ctrl-group" id="nmGroup">
      <label class="h">持ちメダル</label>
      <select id="nm"></select>
    </div>
  </div>
</div>

<div id="info" class="meta"></div>
<div class="tbl-scroll"><table class="main" id="tbl"></table></div>
<div class="note" id="note"></div>

<script src="data.js?v=rushabs"></script>
<script>
const lcdAx=[0,50,100,150,200];
function jitAx(suru){return suru>=1?[100,200,300,400,500,600]:[0,100,200,300,400,500,600];}
const kptSel=document.getElementById("kpt");for(let k=7;k<=15;k++){let o=new Option(k+" pt",k);if(k==10)o.selected=true;kptSel.add(o);}
const suruSel=document.getElementById("suru");for(let s=0;s<=3;s++){let o=new Option(s+" 回",s);if(s==2)o.selected=true;suruSel.add(o);}
const lcdSel=document.getElementById("lcd");for(const l of lcdAx){let o=new Option(l+" G",l);lcdSel.add(o);}
function val(id){return document.querySelector('input[name='+id+']:checked').value;}
const STRAT_LABEL={"RUSH狙い":"RUSH狙い","解放狙い":"RUSH1回狙い(中以上確認で解放まで)","CZ一回狙い":"CZ1回狙い(中以上確認で解放まで)"};
const KPATS={eq:{kashi:50,kokan:50,label:"等価"},k56:{kashi:50,kokan:56,label:"50貸/56交換"},k52:{kashi:46,kokan:52,label:"46貸/52交換"}};
const NM_OPTIONS={eq:[0],k56:[0,100,200,300,400,500],k52:[0,100,200,300,460]};
// 機種定数(グール)
const コイン持ち=31, 純増=4;
const COIN_PER_G=50/コイン持ち;                  // 1.6129
const M_RUSH=1+純増/3;                            // 2.333
const M通常=1-COIN_PER_G/3;                       // 0.4624
// 正しい非等価計算: ev=差枚, 通常G_total, RUSH_G, kpat=交換率, nm=持ちメダル
function calc(ev, 通常G, RG, kpat, nm){
  const k=KPATS[kpat], 交換単価=1000/k.kokan;
  const M5=1-(1-M通常)*(k.kokan/k.kashi);          // 現金G割引機械割
  const 持ちMG=nm/COIN_PER_G;                       // 持ちメダル消化Gの上限
  const 持ちG=Math.min(通常G, 持ちMG)+1;             // やめG=1G分追加
  const 現金G=通常G-Math.min(通常G, 持ちMG);
  const 総G=RG+持ちG+現金G;
  const 機械割=総G>0?(RG*M_RUSH+持ちG*M通常+現金G*M5)/総G:0;
  const yenEv=総G*(機械割-1)*3*交換単価;
  return {yenEv, kw:機械割*100};
}
function yenFmt(z){return (z>=0?"+":"")+Math.round(z).toLocaleString();}

function render(){
  if(typeof DATA==="undefined"){document.getElementById("tbl").innerHTML='<tr><td class="na" style="padding:14px">data.js 未読込（事前計算がまだ or 読込失敗）</td></tr>';return;}
  const strat=val("strat");
  document.getElementById("kptGroup").classList.toggle("hide", strat==="CZ一回狙い");
  if(strat==="CZ一回狙い") renderCZ(); else renderMain(strat);
}

function renderMain(strat){
  const kpt=+kptSel.value, suru=+suruSel.value, kake=+val("kake"), lcd=+lcdSel.value;
  const kpat=val("kpat"), nm=+document.getElementById("nm").value;
  const matagi=suru+kake, jits=jitAx(suru);
  const isKai=strat==="解放狙い";
  let head='<tr><th class="sc">RUSH間G</th><th>RUSH確率</th>';
  if(isKai) head+='<th>接続率</th>';
  head+='<th>解放率</th><th>期待値(円)</th><th class="medal">機械割</th></tr>';
  let h=head;
  const span=isKai?5:4;
  for(const j of jits){
    let v;const isAbs=val("abs")==="1";
    if(isAbs){try{v=DATA_ABS[strat][kpt][matagi][lcd][j];}catch(e){v=null;}}
    if(!v){try{v=DATA[strat][kpt][matagi][lcd][j];}catch(e){v=null;}}
    if(!v){h+=`<tr><td class="sc">${j}</td><td class="na" colspan="${span}">-</td></tr>`;continue;}
    const ev=v[2], 通常G=v[5]||0, RG=v[6]||0;
    const r=calc(ev,通常G,RG,kpat,nm);
    const ec=r.yenEv>=0?"pos":"neg", kc=r.kw>=100?"pos":"neg";
    h+=`<tr><td class="sc">${j}</td><td>1/${v[0]}</td>`;
    if(isKai) h+=`<td>${(v[4]!=null?v[4]:0).toFixed(1)}%</td>`;
    h+=`<td>${v[1].toFixed(1)}%</td>`
      +`<td class="roi ${ec}">${yenFmt(r.yenEv)}</td><td class="roi ${kc}">${r.kw.toFixed(1)}%</td></tr>`;
  }
  document.getElementById("tbl").innerHTML=h;
  const win=matagi>0?`K候補窓 [${Math.max(0,kpt-matagi+1)}〜${kpt}]`:`跨ぎ無し(K>${kpt})`;
  const absMode=val("abs")==="1"?"<b style='color:#C0392B'>既吸収なし台 なし</b>":"";
  document.getElementById("info").innerHTML=
    `【${STRAT_LABEL[strat]}】喰pt=${kpt} ・ スルー${suru} ・ ${kake?"前回駆け抜け":"前回非駆け抜け"} ・ 液晶${lcd}G ・ <b>${KPATS[kpat].label}・持ち${nm}枚</b>　→　跨いだ数${matagi}（${win}）${absMode?" ・ "+absMode:""}`;
}

function renderCZ(){
  const suru=+suruSel.value, kake=+val("kake"), lcd=+lcdSel.value;
  const kpat=val("kpat"), nm=+document.getElementById("nm").value;
  const matagi=suru+kake, RG=suru*100+lcd;
  let h='<tr><th class="sc">喰pt</th><th>接続率</th><th>解放率</th><th>期待値(円)</th><th class="medal">機械割</th></tr>';
  for(let k=7;k<=15;k++){
    let v;const isAbs=val("abs")==="1";
    if(isAbs){try{v=DATA_CZ_ABS[k][suru][kake][lcd];}catch(e){v=null;}}
    if(!v){try{v=DATA_CZ[k][suru][kake][lcd];}catch(e){v=null;}}
    if(!v){h+=`<tr><td class="sc">${k}</td><td class="na" colspan="4">-</td></tr>`;continue;}
    const ev=v[2], 通常G=v[4]||0, RG=v[5]||0;
    const r=calc(ev,通常G,RG,kpat,nm);
    const ec=r.yenEv>=0?"pos":"neg", kc=r.kw>=100?"pos":"neg";
    h+=`<tr><td class="sc">${k}</td><td>${v[0].toFixed(1)}%</td><td>${v[1].toFixed(1)}%</td>`
      +`<td class="roi ${ec}">${yenFmt(r.yenEv)}</td><td class="roi ${kc}">${r.kw.toFixed(1)}%</td></tr>`;
  }
  document.getElementById("tbl").innerHTML=h;
  document.getElementById("info").innerHTML=
    `【${STRAT_LABEL["CZ一回狙い"]}】スルー${suru} ・ ${kake?"前回駆け抜け":"前回非駆け抜け"} ・ 液晶${lcd}G ・ <b>${KPATS[kpat].label}・持ち${nm}枚</b>　→　RUSH間G=${RG}　／　縦=開始時喰pt${val("abs")==="1"?" ・ <b style='color:#C0392B'>既吸収なし台 なし</b>":""}`;
}

function refreshNm(){
  const kpat=val("kpat"), opts=NM_OPTIONS[kpat], prev=+document.getElementById("nm").value;
  const sel=document.getElementById("nm"); sel.innerHTML="";
  for(const m of opts){let o=new Option(m+" 枚",m);if(m===prev)o.selected=true;sel.add(o);}
  if(sel.selectedIndex<0)sel.selectedIndex=0;
}
refreshNm();
document.querySelectorAll('input[name=kpat]').forEach(e=>e.addEventListener("change",refreshNm));
document.querySelectorAll("input,select").forEach(e=>e.addEventListener("change",render));
if(typeof META!=="undefined") document.getElementById("metaN").textContent=META.N.toLocaleString();
document.getElementById("note").innerHTML=
  'RUSH狙い/解放狙い: 縦=RUSH間G、横=RUSH確率/解放率/期待値/機械割。<br>'+
  'CZ一回狙い: 縦=開始時喰pt、横=接続率/解放率/期待値/機械割。RUSH間G=スルー×100+液晶G(導出)。'+
  '接続率=続行数/N(CZ失敗or駆け抜け+中漏れで続行)。<br>'+
  'RUSH狙い=検証済(無条件f(K))。解放狙い/CZ一回狙い=中漏れ後はStep3で解放。パラメータ変更は params.py→precompute.py→リロード。';
render();
</script>
</body>
</html>
