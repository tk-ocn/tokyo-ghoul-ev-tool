<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>WP埋め込みプレビュー</title>
</head>
<body>
<style>
/* === Cocoonテーマ装飾を隠す(このページのみ) === */
body.page .entry-header,
body.page .entry-title,
body.page .entry-meta,
body.page .entry-date,
body.page .date-tags,
body.page .sns-share,
body.page .sns-share-buttons,
body.page .sns-share-top,
body.page .sns-share-bottom,
body.page .sns-follow,
body.page .author-info,
body.page .related-entries,
body.page .entry-tags,
body.page .footer-mobile-buttons,
body.page .mobile-menu-buttons,
body.page .pagination,
body.page .comment-area,
body.page .comments-area,
body.page .eye-catch,
body.page .entry-card-title,
body.page .post-date,
body.page .entry-card-date,
body.page .entry-card,
body.page .breadcrumb,
body.page .breadcrumbs,
body.page #main-share-buttons,
body.page #share-bottom { display: none !important; }
body.page .article { padding: 0 !important; margin: 0 !important; }
body.page .main, body.page .content-in { padding-top: 0 !important; }

/* === Cocoonテーブルストライプ等の干渉を遮断 === */
.ev-tool table.main,
.ev-tool table.main tr,
.ev-tool table.main tbody tr,
.ev-tool table.main tr:nth-child(odd),
.ev-tool table.main tr:nth-child(even),
.ev-tool table.main tbody tr:nth-child(odd),
.ev-tool table.main tbody tr:nth-child(even) { background: transparent !important; }

/* === ツール本体 (.ev-tool スコープ) === */
.ev-tool, .ev-tool * { box-sizing: border-box; -webkit-text-size-adjust: 100%; }
.ev-tool {
  font-family: -apple-system, "Yu Gothic UI", "Yu Gothic", sans-serif;
  background: #f5f5f5; color: #222;
  padding: 12px; margin: 0;
}
.ev-tool .panel { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
                  padding: 12px 14px; margin-bottom: 12px; }
.ev-tool .ctrl { display: flex; gap: 18px; flex-wrap: wrap; align-items: flex-start; }
.ev-tool .ctrl-group { margin-bottom: 4px; }
.ev-tool .ctrl-group.hide { display: none; }
.ev-tool .ctrl-group label.h { display: block; font-size: 12px; font-weight: bold; margin-bottom: 6px; color: #34495E; }
.ev-tool .radio-row label { display: inline-block; font-weight: normal; margin: 0 8px 6px 0; font-size: 14px;
                            cursor: pointer; padding: 6px 12px; background: #ECF0F1; border-radius: 16px; color: #222; }
.ev-tool .radio-row input { margin-right: 4px; transform: scale(1.1); vertical-align: middle; }
.ev-tool .radio-row input:checked + span { font-weight: bold; }
.ev-tool select { padding: 7px 8px; font-size: 14px; border: 1px solid #bbb; border-radius: 4px; background: #fff; color: #222; }
.ev-tool .tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #ddd; border-radius: 6px; max-width: 560px; background: #fff; }
.ev-tool table.main { border-collapse: collapse !important; background: #fff !important; width: 100%; }
.ev-tool table.main th { background: #D6DBDF !important; padding: 8px 10px; font-size: 12px; border: 1px solid #999 !important;
                         text-align: center; position: sticky; top: 0; z-index: 2; white-space: nowrap; color: #222 !important; }
.ev-tool table.main th.medal { background: #D1F2EB !important; }
.ev-tool table.main td { padding: 7px 10px; font-size: 13px; border: 1px solid #d0d0d0 !important; text-align: right; white-space: nowrap; color: #222 !important; background: #fff !important; }
.ev-tool table.main td.sc, .ev-tool table.main th.sc { position: sticky; left: 0; z-index: 1;
                         background: #EBEDEF !important; text-align: center; font-weight: bold; font-size: 13px; }
.ev-tool table.main th.sc { z-index: 3; }
.ev-tool table.main td.na { color: #bbb !important; text-align: center; }
.ev-tool td.roi { font-weight: bold; }
.ev-tool td.roi.pos { background: #EBF5FB !important; color: #1F5FBF !important; }
.ev-tool td.roi.neg { background: #FDEDEC !important; color: #C0392B !important; }

/* スマホ幅: ダーク + 表幅統一 */
@media (max-width: 600px){
  .ev-tool { background: #16181c; color: #e2e4e8; padding: 4px; }
  .ev-tool .panel { background: #23262d; box-shadow: 0 1px 4px rgba(0,0,0,0.4); padding: 6px 8px; }
  .ev-tool .ctrl { gap: 6px 10px; }
  .ev-tool .ctrl-group { margin-bottom: 0; }
  .ev-tool .ctrl-group label.h { color: #aeb4be; font-size: 11px; margin-bottom: 3px; }
  .ev-tool .radio-row label { background: #31353d; color: #d5d8dd; font-size: 12px; padding: 4px 8px; margin: 0 3px 3px 0; }
  .ev-tool .radio-row input:checked + span { color: #6db3ff; }
  .ev-tool select { background: #2b2f37; color: #e2e4e8; border-color: #444; padding: 4px 6px; font-size: 13px; }
  .ev-tool .tbl-scroll { border-color: #3a3d44; max-width: 100%; background: #23262d; }
  .ev-tool table.main { background: #23262d !important; min-width: 0; width: 100%; table-layout: fixed; }
  .ev-tool table.main th, .ev-tool table.main td { width: 54px; }
  .ev-tool table.main th.sc, .ev-tool table.main td.sc { width: 44px; }
  .ev-tool table.main th { background: #2f333b !important; color: #d5d8dd !important; border-color: #43474f !important; padding: 4px 3px; font-size: 11px; }
  .ev-tool table.main th.medal { background: #234038 !important; color: #b8e6d6 !important; }
  .ev-tool table.main td { background: #23262d !important; color: #e2e4e8 !important; border-color: #3a3d44 !important; padding: 4px 3px; font-size: 11px; overflow: hidden; text-overflow: ellipsis; }
  .ev-tool table.main td.sc, .ev-tool table.main th.sc { background: #2d3344 !important; color: #e8eaf0 !important; font-size: 12px; padding: 4px 3px; }
  .ev-tool table.main td.na { color: #666 !important; }
  .ev-tool td.roi.pos { background: #16263a !important; color: #6db3ff !important; }
  .ev-tool td.roi.neg { background: #341a1c !important; color: #ff8b8b !important; }
}
</style>

<div class="panel">

    <div class="ctrl-group">

    <div class="ctrl-group" id="ev_kptGroup">

    </div>
    <div class="ctrl-group">

    </div>
    <div class="ctrl-group">

        <label><input type="radio" name="ev_kpat" value="k52"><span>46貸し/52交換</span></label>
      </div>
    </div>
    <div class="ctrl-group" id="ev_nmGroup">
      <label class="h">持ちメダル</label>
      <select id="ev_nm"></select>
    </div>
  </div>
</div>

<div class="tbl-scroll"><table class="main" id="ev_tbl"></table></div>
</div>

(function(){
const lcdAx=[0,50,100,150,200];
function jitAx(suru){return suru>=1?[100,200,300,400,500,600]:[0,100,200,300,400,500,600];}
const kptSel=document.getElementById("ev_kpt");for(let k=7;k<=15;k++){let o=new Option(k+" pt",k);if(k==10)o.selected=true;kptSel.add(o);}
const suruSel=document.getElementById("ev_suru");for(let s=0;s<=3;s++){let o=new Option(s+" 回",s);if(s==2)o.selected=true;suruSel.add(o);}
const lcdSel=document.getElementById("ev_lcd");for(const l of lcdAx){let o=new Option(l+" G",l);lcdSel.add(o);}
function val(id){return document.querySelector('input[name='+id+']:checked').value;}
const KPATS={eq:{kashi:50,kokan:50,label:"等価"},k56:{kashi:50,kokan:56,label:"50貸/56交換"},k52:{kashi:46,kokan:52,label:"46貸/52交換"}};
const NM_OPTIONS={eq:[0],k56:[0,100,200,300,400,500],k52:[0,100,200,300,460]};
const コイン持ち=31, 純増=4;
const COIN_PER_G=50/コイン持ち;
const M_RUSH=1+純増/3;
const M通常=1-COIN_PER_G/3;
function calc(ev, 通常G, RG, kpat, nm){
  const k=KPATS[kpat], 交換単価=1000/k.kokan;
  const M5=1-(1-M通常)*(k.kokan/k.kashi);
  const 持ちMG=nm/COIN_PER_G;
  const 持ちG=Math.min(通常G, 持ちMG)+1;
  const 現金G=通常G-Math.min(通常G, 持ちMG);
  const 総G=RG+持ちG+現金G;
  const 機械割=総G>0?(RG*M_RUSH+持ちG*M通常+現金G*M5)/総G:0;
  const yenEv=総G*(機械割-1)*3*交換単価;
  return {yenEv, kw:機械割*100};
}
function yenFmt(z){return (z>=0?"+":"")+Math.round(z).toLocaleString();}

function render(){
  if(typeof DATA==="undefined"){document.getElementById("ev_tbl").innerHTML='<tr><td class="na" style="padding:14px">data.js 未読込</td></tr>';return;}
  const strat=val("ev_strat");
  document.getElementById("ev_kptGroup").classList.toggle("hide", strat==="CZ一回狙い");
  if(strat==="CZ一回狙い") renderCZ(); else renderMain(strat);
}

function renderMain(strat){
  const kpt=+kptSel.value, suru=+suruSel.value, kake=+val("ev_kake"), lcd=+lcdSel.value;
  const kpat=val("ev_kpat"), nm=+document.getElementById("ev_nm").value;
  const matagi=suru+kake, jits=jitAx(suru);
  const isKai=strat==="解放狙い";
  let head='<tr><th class="sc">RUSH間G</th><th>RUSH確率</th>';
  if(isKai) head+='<th>接続率</th>';
  head+='<th>解放率</th><th>期待値(円)</th><th class="medal">機械割</th></tr>';
  let h=head;
  const span=isKai?5:4;
  for(const j of jits){
    let v;const isAbs=val("ev_abs")==="1";
    if(isAbs){try{v=(typeof DATA_ABS!=="undefined")?DATA_ABS[strat][kpt][matagi][lcd][j]:null;}catch(e){v=null;}}
    if(!v){try{v=DATA[strat][kpt][matagi][lcd][j];}catch(e){v=null;}}
    if(!v){h+=`<tr><td class="sc">${j}</td><td class="na" colspan="${span}">-</td></tr>`;continue;}
    const ev=v[2], 通常G=v[5]||0, RG=v[6]||0;
    const r=calc(ev,通常G,RG,kpat,nm);
    const ec=r.yenEv>=0?"pos":"neg", kc=r.kw>=100?"pos":"neg";
    h+=`<tr><td class="sc">${j}</td><td>1/${v[0]}</td>`;
    if(isKai) h+=`<td>${(v[4]!=null?v[4]:0).toFixed(1)}%</td>`;
    h+=`<td>${v[1].toFixed(1)}%</td>`
      +`<td class="roi ${ec}">${yenFmt(r.yenEv)}</td><td class="roi ${kc}">${r.kw.toFixed(1)}%</td></tr>`;
  }
  document.getElementById("ev_tbl").innerHTML=h;
}

function renderCZ(){
  const suru=+suruSel.value, kake=+val("ev_kake"), lcd=+lcdSel.value;
  const kpat=val("ev_kpat"), nm=+document.getElementById("ev_nm").value;
  let h='<tr><th class="sc">喰pt</th><th>接続率</th><th>解放率</th><th>期待値(円)</th><th class="medal">機械割</th></tr>';
  for(let k=7;k<=15;k++){
    let v;const isAbs=val("ev_abs")==="1";
    if(isAbs){try{v=(typeof DATA_CZ_ABS!=="undefined")?DATA_CZ_ABS[k][suru][kake][lcd]:null;}catch(e){v=null;}}
    if(!v){try{v=DATA_CZ[k][suru][kake][lcd];}catch(e){v=null;}}
    if(!v){h+=`<tr><td class="sc">${k}</td><td class="na" colspan="4">-</td></tr>`;continue;}
    const ev=v[2], 通常G=v[4]||0, RGv=v[5]||0;
    const r=calc(ev,通常G,RGv,kpat,nm);
    const ec=r.yenEv>=0?"pos":"neg", kc=r.kw>=100?"pos":"neg";
    h+=`<tr><td class="sc">${k}</td><td>${v[0].toFixed(1)}%</td><td>${v[1].toFixed(1)}%</td>`
      +`<td class="roi ${ec}">${yenFmt(r.yenEv)}</td><td class="roi ${kc}">${r.kw.toFixed(1)}%</td></tr>`;
  }
  document.getElementById("ev_tbl").innerHTML=h;
}

function refreshNm(){
  const kpat=val("ev_kpat"), opts=NM_OPTIONS[kpat], prev=+document.getElementById("ev_nm").value;
  const sel=document.getElementById("ev_nm"); sel.innerHTML="";
  for(const m of opts){let o=new Option(m+" 枚",m);if(m===prev)o.selected=true;sel.add(o);}
  if(sel.selectedIndex<0)sel.selectedIndex=0;
}
refreshNm();
document.querySelectorAll('input[name=ev_kpat]').forEach(e=>e.addEventListener("change",refreshNm));
document.querySelectorAll('.ev-tool input, .ev-tool select').forEach(e=>e.addEventListener("change",render));
render();
})();
</script>
